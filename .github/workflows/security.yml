name: Security & Quality Check

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 8:00 UTC

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Secrets are injected at deploy time, not in CI; skip env validation.
          SKIP_ENV_VALIDATION: "true"
